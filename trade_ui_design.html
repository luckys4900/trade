<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>トレード UI デザイン - サイドパネルオプション</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            padding: 20px;
            color: #333;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { margin-bottom: 10px; font-size: 28px; }
        .subtitle { color: #666; margin-bottom: 30px; font-size: 14px; }
        .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
        }
        .card.selected {
            border: 3px solid #5cb85c;
            box-shadow: 0 4px 16px rgba(92, 184, 92, 0.3);
        }
        .card-image { background: #f9f9f9; padding: 0; }
        .mockup {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 0;
            min-height: 300px;
        }
        .mockup-header {
            font-weight: bold;
            color: #666;
            padding: 0 0 10px 0;
            font-size: 12px;
            border-bottom: 1px solid #ddd;
            margin-bottom: 10px;
        }
        .card-body { padding: 16px; }
        .card-body h3 { margin-bottom: 8px; font-size: 16px; }
        .card-body p { font-size: 13px; line-height: 1.5; color: #666; }
        .selected-info {
            background: #e8f5e9;
            border-left: 4px solid #5cb85c;
            padding: 15px;
            border-radius: 4px;
            margin-top: 20px;
        }
        .selected-info h2 { font-size: 18px; margin-bottom: 10px; color: #2e7d32; }
        .selected-info p { font-size: 13px; line-height: 1.6; margin-bottom: 8px; }
        button {
            background: #5cb85c;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            margin-top: 15px;
        }
        button:hover { background: #4cae4c; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 トレード UI デザイン選択</h1>
        <p class="subtitle">右サイドパネル - 3つの情報表示パターン</p>

        <div class="cards" id="cards"></div>

        <div id="selection"></div>
    </div>

    <script>
        const designs = [
            {
                id: 'a',
                title: 'A: プログレスバー型',
                description: 'パーセンテージで直感的、シンプルで明確',
                details: '数字とプログレスバーで準備度を視覚化。インジケーター（RSI/ATR）も表示。監視・判断支援向け。',
                image: '<div style="margin-bottom: 12px;"><div style="color: #666; font-weight: 500; margin-bottom: 4px;">📍 現在価格</div><div style="background: #fff; border: 1px solid #ddd; border-radius: 4px; padding: 8px; font-size: 14px; font-weight: bold;">BTC: $67,234</div></div><div style="margin-bottom: 12px;"><div style="color: #666; font-weight: 500; margin-bottom: 4px;">🎯 次の買いレベル</div><div style="background: #fff; border: 1px solid #ddd; border-radius: 4px; padding: 8px; font-size: 13px; font-weight: bold;">$67,000</div></div><div style="margin-bottom: 12px;"><div style="color: #666; font-weight: 500; margin-bottom: 4px;">📊 準備度</div><div style="color: #d9534f; font-weight: bold; margin-bottom: 2px;">あと 0.35% で到達</div><div style="height: 12px; background: #e0e0e0; border-radius: 6px; overflow: hidden;"><div style="height: 100%; width: 95%; background: linear-gradient(90deg, #5cb85c, #f0ad4e, #d9534f); border-radius: 6px;"></div></div></div><div style="border-top: 1px solid #e0e0e0; padding-top: 10px;"><div style="color: #666; font-weight: 500; margin-bottom: 6px;">📈 インジケーター</div><div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;"><div style="background: #fff; border: 1px solid #ddd; border-radius: 4px; padding: 6px; text-align: center;"><div style="color: #888; font-size: 10px;">RSI</div><div style="color: #5cb85c; font-weight: bold; font-size: 14px;">45</div></div><div style="background: #fff; border: 1px solid #ddd; border-radius: 4px; padding: 6px; text-align: center;"><div style="color: #888; font-size: 10px;">ATR</div><div style="color: #5cb85c; font-weight: bold; font-size: 14px;">850</div></div></div></div>'
            },
            {
                id: 'b',
                title: 'B: 色分けゲージ型',
                description: 'READY/WARN/FAR で状態一目瞭然、詳細エビデンス',
                details: '色分けされた3段階ゲージで状態を表示。距離、時間、指標の詳細エビデンスを含む。判定支援向け。',
                image: '<div style="margin-bottom: 12px;"><div style="color: #666; font-weight: 500; margin-bottom: 4px;">📍 現在価格</div><div style="background: #fff; border: 1px solid #ddd; border-radius: 4px; padding: 8px; font-size: 14px; font-weight: bold;">BTC: $67,234</div></div><div style="margin-bottom: 12px;"><div style="color: #666; font-weight: 500; margin-bottom: 4px;">🎯 次の買いレベル</div><div style="background: #fff; border: 1px solid #ddd; border-radius: 4px; padding: 8px; font-size: 13px; font-weight: bold;">$67,000</div></div><div style="margin-bottom: 12px;"><div style="color: #666; font-weight: 500; margin-bottom: 4px;">🔔 準備度</div><div style="display: flex; gap: 4px; margin-bottom: 4px;"><div style="flex: 1; height: 20px; background: #5cb85c; border-radius: 3px; text-align: center; color: #fff; font-size: 10px; line-height: 20px;">READY</div><div style="flex: 1; height: 20px; background: #f0ad4e; border-radius: 3px; text-align: center; color: #fff; font-size: 10px; line-height: 20px;">WARN</div><div style="flex: 1; height: 20px; background: #d9534f; border-radius: 3px; text-align: center; color: #fff; font-size: 10px; line-height: 20px;">FAR</div></div><div style="color: #f0ad4e; font-weight: bold;">⚠️ あと 0.35% で「READY」に</div></div><div style="border-top: 1px solid #e0e0e0; padding-top: 10px; margin-bottom: 10px;"><div style="color: #666; font-weight: 500; margin-bottom: 6px;">📏 エビデンス詳細</div><div style="background: #fff; border: 1px solid #ddd; border-radius: 4px; padding: 6px; font-size: 11px;"><div style="margin-bottom: 3px;">差額: $234 (-0.35%)</div><div style="margin-bottom: 3px;">ATRまで: 3.6 日分</div><div>推定達成: 4時間以内</div></div></div>'
            },
            {
                id: 'c',
                title: 'C: スマート分析型',
                description: 'AI推奨で判断短縮、複合評価を表示',
                details: 'ヘッダーに準備度を表示。AI判定とトレンド分析を含む。意思決定を高速化。',
                image: '<div style="background: linear-gradient(135deg, #f0ad4e, #ec971f); color: white; border-radius: 4px; padding: 10px; margin-bottom: 12px; font-weight: bold;">⚡ 準備度: 95% 接近</div><div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px;"><div style="background: #fff; border: 1px solid #ddd; border-radius: 4px; padding: 8px;"><div style="color: #888; font-size: 10px; margin-bottom: 2px;">現在</div><div style="color: #333; font-weight: bold;">$67,234</div></div><div style="background: #fff; border: 1px solid #ddd; border-radius: 4px; padding: 8px;"><div style="color: #888; font-size: 10px; margin-bottom: 2px;">次レベル</div><div style="color: #d9534f; font-weight: bold;">$67,000</div></div></div><div style="background: #ecf0f1; border: 1px solid #bdc3c7; border-radius: 4px; padding: 8px; margin-bottom: 12px;"><div style="color: #666; font-weight: 500; font-size: 11px; margin-bottom: 4px;">🤖 判定</div><div style="color: #27ae60; font-weight: bold; font-size: 11px; margin-bottom: 4px;">✓ エントリー環境：良好</div><div style="color: #7f8c8d; font-size: 10px; line-height: 1.4;">RSI中立 + ATR安定<br/>ボラティリティ低<br/>スリップ最小</div></div><div style="margin-bottom: 12px;"><div style="color: #666; font-weight: 500; margin-bottom: 4px;">📈 短期トレンド</div><div style="background: #fff; border: 1px solid #ddd; border-radius: 4px; padding: 6px; font-size: 11px;"><div>1h: → (横ばい)</div><div>4h: ↑ (上昇)</div><div>1d: ↑ (上昇)</div></div></div>'
            }
        ];

        const cardsContainer = document.getElementById('cards');
        designs.forEach((design, index) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-image">
                    <div class="mockup">
                        <div class="mockup-header">Option ${design.id.toUpperCase()}</div>
                        <div class="mockup-body">${design.image}</div>
                    </div>
                </div>
                <div class="card-body">
                    <h3>${design.title}</h3>
                    <p>${design.description}</p>
                </div>
            `;
            card.onclick = function() {
                selectCard(design);
            };
            cardsContainer.appendChild(card);
        });

        function selectCard(design) {
            document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
            event.target.closest('.card').classList.add('selected');

            const selectionDiv = document.getElementById('selection');
            selectionDiv.innerHTML = `
                <div class="selected-info">
                    <h2>✓ 選択: ${design.title}</h2>
                    <p><strong>説明:</strong> ${design.details}</p>
                    <p style="margin-top: 12px; color: #555;">
                        このオプションを選択しました。詳細な実装計画に進めます。
                    </p>
                </div>
            `;

            // コンソールに選択を出力（ユーザーが確認できるように）
            console.log('選択されたデザイン:', design.title);
        }
    </script>
</body>
</html>
