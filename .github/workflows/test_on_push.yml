name: Test on Push

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Create .env file
      run: |
        cp .env.example .env
        echo "HYPERLIQUID_API_KEY=test_key" >> .env
        echo "TRADING_ENV=test" >> .env

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pylint black isort

    - name: Code style check (black)
      run: |
        black --check . --exclude=venv,__pycache__ || true

    - name: Import sort check (isort)
      run: |
        isort --check-only . --skip=venv || true

    - name: Lint with pylint
      run: |
        pylint **/*.py --disable=all --enable=E --exit-zero || true

    - name: Run unit tests
      run: |
        pytest data/test_*.py -v --cov=. --cov-report=xml || true

    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
      continue-on-error: true

    - name: Security check with bandit
      run: |
        pip install bandit
        bandit -r . -f json -o bandit-report.json || true
      continue-on-error: true

    - name: Upload security report
      uses: actions/upload-artifact@v3
      with:
        name: security-report-${{ matrix.python-version }}
        path: bandit-report.json
      continue-on-error: true

  backtest:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Create .env file
      run: |
        cp .env.example .env
        echo "TRADING_ENV=backtest" >> .env

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run backtest validation
      run: |
        python data/clarity_act_core.py --validate --backtest || true
      continue-on-error: true

    - name: Check backtest results
      run: |
        if [ -f data/backtest_results.json ]; then
          echo "Backtest results found"
          cat data/backtest_results.json
        fi
      continue-on-error: true

  build:
    runs-on: ubuntu-latest
    needs: [test, backtest]

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Create distribution package
      run: |
        python -m pip install build
        python -m build

    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: build-artifacts
        path: dist/
      continue-on-error: true
