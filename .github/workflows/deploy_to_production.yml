name: Deploy to Production

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Validate version tags
      run: |
        VERSION_TAG=$(git describe --tags --always)
        echo "Version: $VERSION_TAG"
        if [[ ! $VERSION_TAG =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
          echo "Invalid version tag: $VERSION_TAG"
          exit 1
        fi

    - name: Run pre-deployment tests
      run: |
        python -m pytest data/test_*.py -v --tb=short || true

  deploy-staging:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event.inputs.environment == 'staging' || contains(github.ref, 'staging')

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Deploy to staging
      env:
        STAGING_HOST: ${{ secrets.STAGING_HOST }}
        STAGING_USER: ${{ secrets.STAGING_USER }}
        STAGING_KEY: ${{ secrets.STAGING_KEY }}
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.STAGING_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.STAGING_HOST }} >> ~/.ssh/known_hosts

        # Sync to staging
        rsync -avz \
          --exclude='.git' \
          --exclude='.env' \
          --exclude='logs/' \
          --exclude='__pycache__/' \
          ./ \
          ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}:/opt/trade/

    - name: Run staging tests
      env:
        STAGING_HOST: ${{ secrets.STAGING_HOST }}
        STAGING_USER: ${{ secrets.STAGING_USER }}
        STAGING_KEY: ${{ secrets.STAGING_KEY }}
      run: |
        ssh ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} \
          "cd /opt/trade && python -m pytest data/test_*.py -v" || true

  deploy-production:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event.inputs.environment == 'production' || contains(github.ref, 'v')
    environment:
      name: production
      url: https://trade.example.com

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Create backup on production
      env:
        PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
        PRODUCTION_USER: ${{ secrets.PRODUCTION_USER }}
        PRODUCTION_KEY: ${{ secrets.PRODUCTION_KEY }}
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.PRODUCTION_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.PRODUCTION_HOST }} >> ~/.ssh/known_hosts

        # Create backup
        BACKUP_DIR="/home/${{ secrets.PRODUCTION_USER }}/trade_backup_$(date +%Y%m%d_%H%M%S)"
        ssh ${{ secrets.PRODUCTION_USER }}@${{ secrets.PRODUCTION_HOST }} \
          "mkdir -p $BACKUP_DIR && cp -r ~/trade/* $BACKUP_DIR/ 2>/dev/null || true && echo $BACKUP_DIR"

    - name: Deploy to production
      env:
        PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
        PRODUCTION_USER: ${{ secrets.PRODUCTION_USER }}
        PRODUCTION_KEY: ${{ secrets.PRODUCTION_KEY }}
      run: |
        # Sync files to production
        rsync -avz \
          --exclude='.git' \
          --exclude='.env' \
          --exclude='logs/' \
          --exclude='__pycache__/' \
          --exclude='backups/' \
          ./ \
          ${{ secrets.PRODUCTION_USER }}@${{ secrets.PRODUCTION_HOST }}:~/trade/

    - name: Health check
      env:
        PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
        PRODUCTION_USER: ${{ secrets.PRODUCTION_USER }}
        PRODUCTION_KEY: ${{ secrets.PRODUCTION_KEY }}
      run: |
        ssh ${{ secrets.PRODUCTION_USER }}@${{ secrets.PRODUCTION_HOST }} \
          "cd ~/trade && bash deploy_scripts/health_check.sh"
      continue-on-error: true

    - name: Create deployment record
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          const deployment = {
            timestamp: new Date().toISOString(),
            version: context.ref,
            actor: context.actor,
            commit: context.sha,
            environment: 'production'
          };
          console.log(JSON.stringify(deployment, null, 2));

    - name: Send notification
      if: always()
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        text: |
          Production Deployment: ${{ job.status }}
          Version: ${{ github.ref }}
          Commit: ${{ github.sha }}
          Actor: ${{ github.actor }}
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
      continue-on-error: true

  post-deploy:
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: always()

    steps:
    - uses: actions/checkout@v3

    - name: Create deployment summary
      run: |
        cat > deployment_summary.md << EOF
        # Deployment Summary

        **Version**: ${{ github.ref }}
        **Commit**: ${{ github.sha }}
        **Actor**: ${{ github.actor }}
        **Status**: ${{ needs.deploy-production.result }}
        **Time**: $(date -u +'%Y-%m-%dT%H:%M:%SZ')

        ## Checklist
        - [ ] Health checks passed
        - [ ] No critical alerts
        - [ ] Performance metrics normal
        - [ ] User-facing features working
        EOF
        cat deployment_summary.md

    - name: Upload deployment summary
      uses: actions/upload-artifact@v3
      with:
        name: deployment-summary
        path: deployment_summary.md
